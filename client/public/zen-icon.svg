<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Hotel building silhouette -->
  <rect x="180" y="140" width="152" height="240" fill="white" opacity="0.95"/>
  
  <!-- Windows -->
  <rect x="200" y="160" width="25" height="30" fill="#14b8a6"/>
  <rect x="243" y="160" width="25" height="30" fill="#14b8a6"/>
  <rect x="287" y="160" width="25" height="30" fill="#14b8a6"/>
  
  <rect x="200" y="210" width="25" height="30" fill="#14b8a6"/>
  <rect x="243" y="210" width="25" height="30" fill="#14b8a6"/>
  <rect x="287" y="210" width="25" height="30" fill="#14b8a6"/>
  
  <rect x="200" y="260" width="25" height="30" fill="#14b8a6"/>
  <rect x="243" y="260" width="25" height="30" fill="#14b8a6"/>
  <rect x="287" y="260" width="25" height="30" fill="#14b8a6"/>
  
  <!-- Door -->
  <rect x="230" y="320" width="52" height="60" fill="#0d9488"/>
  
  <!-- Zen circle symbol on top -->
  <circle cx="256" cy="100" r="35" fill="white" opacity="0.9"/>
  <circle cx="256" cy="100" r="25" fill="none" stroke="#14b8a6" stroke-width="3"/>
  <path d="M 241 100 L 271 100" stroke="#14b8a6" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Text "ZEN" -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">ZEN</text>
</svg>
